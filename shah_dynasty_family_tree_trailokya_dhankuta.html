
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.tree-wrap { padding: 16px 0; overflow-x: auto; }
h2.tree-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
p.tree-sub { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 16px; }
.legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
.leg-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--color-text-secondary); }
.leg-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
.leg-king { background: #3C3489; }
.leg-prince { background: #0C447C; }
.leg-dhankuta { background: #3B6D11; }
.leg-you { background: #854F0B; }
svg text { font-family: var(--font-sans); }
.node-btn { cursor: pointer; }
.node-btn:hover rect { opacity: 0.85; }
.tooltip {
  position: absolute;
  background: var(--color-background-secondary);
  border: 1px solid var(--color-border-primary);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12px;
  color: var(--color-text-primary);
  max-width: 220px;
  pointer-events: none;
  display: none;
  z-index: 99;
  line-height: 1.6;
}
.tooltip.active { display: block; }
.tooltip strong { font-weight: 500; font-size: 13px; display: block; margin-bottom: 4px; }
.tooltip .dates { color: var(--color-text-secondary); font-size: 11px; margin-bottom: 4px; }
.tooltip .note { font-style: italic; color: var(--color-text-tertiary); font-size: 11px; }
</style>

<script>
const tips = {
  king: '#3C3489',
  prince: '#185FA5',
  dhankuta: '#27500A',
  you: '#854F0B'
};

function showTip(e, name, dates, note, type) {
  const tt = document.getElementById('tt');
  tt.innerHTML = '<strong>' + name + '</strong><div class="dates">' + dates + '</div><div>' + note + '</div>';
  tt.style.borderColor = tips[type] || '#888';
  tt.classList.add('active');
  const wrap = tt.parentElement;
  const rect = wrap.getBoundingClientRect();
  const clickX = e.clientX - rect.left;
  const clickY = e.clientY - rect.top;
  tt.style.left = Math.min(clickX + 12, wrap.offsetWidth - 240) + 'px';
  tt.style.top = (clickY - 10) + 'px';
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.node-btn') && !e.target.closest('#tt')) {
    document.getElementById('tt').classList.remove('active');
  }
});
</script>
